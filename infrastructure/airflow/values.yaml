# Mengaktifkan GitSync agar DAG otomatis terupdate saat ada commit baru
dags:
  gitSync:
    enabled: true
    repo: https://github.com/Alvarras/airflow-spark-k8s-gitops.git
    branch: main
    rev: HEAD
    depth: 1
    subPath: "dags" # Menunjuk ke folder dags di dalam repo
    wait: 60

# Pastikan eksekutor menggunakan Kubernetes
executor: "KubernetesExecutor"

# Fix for ArgoCD: Disable Helm hooks for jobs so they run as normal resources
createUserJob:
  useHelmHooks: false
  applyCustomEnv: false
  jobAnnotations:
    "argocd.argoproj.io/hook": Sync
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation
migrateDatabaseJob:
  useHelmHooks: false
  applyCustomEnv: false
  jobAnnotations:
    "argocd.argoproj.io/hook": Sync
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation

# Mengonfigurasi Ingress untuk Airflow UI
ingress:
  web:
    enabled: true
    ingressClassName: "nginx" 
    path: "/"
    hosts:
      - name: "airflow.rivqi.dtc.best" 
        tls:
          enabled: true