# =============================================================================
# TEMPLATE ONLY — JANGAN COMMIT NILAI ASLI KE GIT!
# =============================================================================
# File ini hanya sebagai dokumentasi struktur Secret.
# Buat file baru di luar repo (misal: ~/secrets/ecommerce-pipeline-secret.yaml)
# dan isi dengan nilai asli, lalu apply dengan:
#
#   kubectl apply -f ~/secrets/ecommerce-pipeline-secret.yaml -n airflow
#
# Atau gunakan kubectl create secret langsung:
#
#   kubectl create secret generic ecommerce-pipeline-secret \
#     --from-literal=S3_ACCESS_KEY="<ACCESS_KEY_MINIO>" \
#     --from-literal=S3_SECRET_KEY="<SECRET_KEY_MINIO>" \
#     --from-literal=S3_ENDPOINT="https://s3.rivqi.dtc.best/" \
#     --from-literal=S3_BUCKET="airflow" \
#     --from-literal=S3_FILE="ecommerce_data__matt2434_2019-Dec-Cleaned.csv" \
#     --from-literal=DB_HOST="10.5.0.35" \
#     --from-literal=DB_USER="dbadmin" \
#     --from-literal=DB_PASSWORD="<PASSWORD_POSTGRESQL>" \
#     --from-literal=DB_PORT="5432" \
#     --from-literal=DB_NAME="dbadmin" \
#     -n airflow
#
# Verifikasi Secret berhasil dibuat:
#   kubectl get secret ecommerce-pipeline-secret -n airflow
#   kubectl describe secret ecommerce-pipeline-secret -n airflow
#
# Secret ini TIDAK dikelola oleh ArgoCD sehingga tidak akan
# di-prune atau di-overwrite saat ArgoCD sync.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-pipeline-secret
  namespace: airflow
  labels:
    app: spark-ecommerce-analytics
    managed-by: manual   # Bukan ArgoCD
type: Opaque
stringData:
  # ── MinIO / S3 Credentials ─────────────────────────────────────────────
  S3_ACCESS_KEY: "<GANTI_DENGAN_ACCESS_KEY_MINIO>"
  S3_SECRET_KEY: "<GANTI_DENGAN_SECRET_KEY_MINIO>"
  S3_ENDPOINT:   "https://s3.rivqi.dtc.best/"
  S3_BUCKET:     "airflow"
  S3_FILE:       "ecommerce_data__matt2434_2019-Dec-Cleaned.csv"

  # ── PostgreSQL Credentials ─────────────────────────────────────────────
  DB_HOST:     "10.5.0.35"
  DB_PORT:     "5432"
  DB_NAME:     "dbadmin"
  DB_USER:     "dbadmin"
  DB_PASSWORD: "<GANTI_DENGAN_PASSWORD_POSTGRESQL>"
