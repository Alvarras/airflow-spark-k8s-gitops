apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://airflow.apache.org'
      targetRevision: 1.22.0 # Sesuaikan dengan versi Helm chart Airflow terbaru
      chart: airflow
      helm:
        valueFiles:
          - $values/infrastructure/airflow/values.yaml
    - repoURL: 'https://github.com/Alvarras/airflow-spark-k8s-gitops.git'
      targetRevision: main
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: airflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true